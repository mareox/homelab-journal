<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="svcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0f3d3a"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#3b82f6" flood-opacity="0.4"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">Unified Homelab MCP Server Architecture</text>

  <!-- AI Clients Section -->
  <rect x="30" y="55" width="840" height="75" rx="8" fill="url(#clientGrad)" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <text x="50" y="78" fill="#86efac" font-size="11" font-weight="600" letter-spacing="1.5">AI CLIENTS</text>

  <rect x="60" y="88" width="140" height="32" rx="6" fill="#064e3b" stroke="#22c55e" stroke-width="1" filter="url(#softShadow)"/>
  <text x="130" y="109" text-anchor="middle" fill="#e2e8f0" font-size="12">Claude Code</text>

  <rect x="220" y="88" width="140" height="32" rx="6" fill="#064e3b" stroke="#22c55e" stroke-width="1" filter="url(#softShadow)"/>
  <text x="290" y="109" text-anchor="middle" fill="#e2e8f0" font-size="12">OpenClaw Agents</text>

  <rect x="380" y="88" width="140" height="32" rx="6" fill="#064e3b" stroke="#22c55e" stroke-width="1" filter="url(#softShadow)"/>
  <text x="450" y="109" text-anchor="middle" fill="#e2e8f0" font-size="12">Future Clients</text>

  <!-- Transport labels -->
  <text x="580" y="100" fill="#94a3b8" font-size="10">stdio</text>
  <text x="580" y="115" fill="#94a3b8" font-size="10">SSE/HTTP</text>
  <rect x="620" y="91" width="50" height="14" rx="3" fill="#22c55e" opacity="0.2"/>
  <text x="645" y="102" text-anchor="middle" fill="#22c55e" font-size="9">local</text>
  <rect x="620" y="107" width="50" height="14" rx="3" fill="#f59e0b" opacity="0.2"/>
  <text x="645" y="118" text-anchor="middle" fill="#f59e0b" font-size="9">remote</text>

  <!-- Connection lines from clients to MCP -->
  <line x1="130" y1="120" x2="130" y2="160" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="290" y1="120" x2="290" y2="160" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="450" y1="120" x2="450" y2="160" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- MCP Server Core -->
  <rect x="50" y="160" width="800" height="100" rx="8" fill="url(#mcpGrad)" stroke="#60a5fa" stroke-width="1.5" filter="url(#glow)"/>
  <text x="450" y="185" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">homelab-mcp (FastMCP)</text>

  <!-- Core components inside MCP box -->
  <rect x="80" y="198" width="120" height="28" rx="5" fill="rgba(255,255,255,0.12)"/>
  <text x="140" y="217" text-anchor="middle" fill="#e2e8f0" font-size="11">Config Loader</text>

  <rect x="220" y="198" width="150" height="28" rx="5" fill="rgba(255,255,255,0.12)"/>
  <text x="295" y="217" text-anchor="middle" fill="#e2e8f0" font-size="11">Tool Registration</text>

  <rect x="390" y="198" width="120" height="28" rx="5" fill="rgba(255,255,255,0.12)"/>
  <text x="450" y="217" text-anchor="middle" fill="#e2e8f0" font-size="11">Safety Gate</text>

  <rect x="530" y="198" width="140" height="28" rx="5" fill="rgba(255,255,255,0.12)"/>
  <text x="600" y="217" text-anchor="middle" fill="#e2e8f0" font-size="11">MCP Resources</text>

  <rect x="690" y="198" width="130" height="28" rx="5" fill="rgba(255,255,255,0.12)"/>
  <text x="755" y="217" text-anchor="middle" fill="#e2e8f0" font-size="11">Dual Transport</text>

  <!-- Graceful degradation note -->
  <text x="450" y="250" text-anchor="middle" fill="#94a3b8" font-size="10" font-style="italic">Graceful degradation: missing creds = service tools don't register, server still works</text>

  <!-- Connection lines from MCP to services -->
  <line x1="100" y1="260" x2="100" y2="295" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="200" y1="260" x2="200" y2="295" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="300" y1="260" x2="300" y2="295" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="400" y1="260" x2="400" y2="295" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="500" y1="260" x2="500" y2="295" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="600" y1="260" x2="600" y2="295" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="700" y1="260" x2="700" y2="295" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="800" y1="260" x2="800" y2="295" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Service Backends Section -->
  <text x="50" y="290" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">SERVICE BACKENDS (async httpx)</text>

  <!-- Service boxes - Row 1 -->
  <rect x="50" y="300" width="155" height="55" rx="6" fill="url(#svcGrad)" stroke="#3b82f6" stroke-width="1" filter="url(#softShadow)"/>
  <text x="127" y="320" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">Proxmox VE</text>
  <text x="127" y="340" text-anchor="middle" fill="#94a3b8" font-size="9">7 tools | cluster + guests</text>

  <rect x="215" y="300" width="155" height="55" rx="6" fill="url(#svcGrad)" stroke="#22c55e" stroke-width="1" filter="url(#softShadow)"/>
  <text x="292" y="320" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Pi-hole DNS</text>
  <text x="292" y="340" text-anchor="middle" fill="#94a3b8" font-size="9">4 tools | HA pair</text>

  <rect x="380" y="300" width="155" height="55" rx="6" fill="url(#svcGrad)" stroke="#f59e0b" stroke-width="1" filter="url(#softShadow)"/>
  <text x="457" y="320" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Prometheus</text>
  <text x="457" y="340" text-anchor="middle" fill="#94a3b8" font-size="9">2 tools | PromQL + alerts</text>

  <rect x="545" y="300" width="155" height="55" rx="6" fill="url(#svcGrad)" stroke="#a855f7" stroke-width="1" filter="url(#softShadow)"/>
  <text x="622" y="320" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="600">Graylog</text>
  <text x="622" y="340" text-anchor="middle" fill="#94a3b8" font-size="9">1 tool | log search</text>

  <!-- Service boxes - Row 2 -->
  <rect x="50" y="365" width="155" height="55" rx="6" fill="url(#svcGrad)" stroke="#ef4444" stroke-width="1" filter="url(#softShadow)"/>
  <text x="127" y="385" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">Semaphore</text>
  <text x="127" y="405" text-anchor="middle" fill="#94a3b8" font-size="9">4 tools | CI/CD tasks</text>

  <rect x="215" y="365" width="155" height="55" rx="6" fill="url(#svcGrad)" stroke="#06b6d4" stroke-width="1" filter="url(#softShadow)"/>
  <text x="292" y="385" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">Caddy</text>
  <text x="292" y="405" text-anchor="middle" fill="#94a3b8" font-size="9">2 tools | reverse proxy</text>

  <rect x="380" y="365" width="155" height="55" rx="6" fill="url(#svcGrad)" stroke="#ec4899" stroke-width="1" filter="url(#softShadow)"/>
  <text x="457" y="385" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="600">NetBox</text>
  <text x="457" y="405" text-anchor="middle" fill="#94a3b8" font-size="9">2 tools | IPAM</text>

  <rect x="545" y="365" width="155" height="55" rx="6" fill="url(#svcGrad)" stroke="#84cc16" stroke-width="1" filter="url(#softShadow)"/>
  <text x="622" y="385" text-anchor="middle" fill="#bef264" font-size="12" font-weight="600">n8n + PBS</text>
  <text x="622" y="405" text-anchor="middle" fill="#94a3b8" font-size="9">3 tools | workflows + backup</text>

  <!-- Multi-service health check -->
  <rect x="710" y="300" width="155" height="120" rx="6" fill="url(#svcGrad)" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" filter="url(#softShadow)"/>
  <text x="787" y="340" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">service_health</text>
  <text x="787" y="358" text-anchor="middle" fill="#94a3b8" font-size="9">parallel check</text>
  <text x="787" y="373" text-anchor="middle" fill="#94a3b8" font-size="9">across all</text>
  <text x="787" y="388" text-anchor="middle" fill="#94a3b8" font-size="9">configured</text>
  <text x="787" y="403" text-anchor="middle" fill="#94a3b8" font-size="9">services</text>

  <!-- Infrastructure Layer -->
  <text x="50" y="450" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">INFRASTRUCTURE (your homelab)</text>

  <rect x="50" y="460" width="815" height="80" rx="8" fill="rgba(30,41,59,0.6)" stroke="#475569" stroke-width="1"/>

  <!-- Infrastructure icons/boxes -->
  <rect x="70" y="475" width="90" height="50" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="115" y="496" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">Proxmox</text>
  <text x="115" y="512" text-anchor="middle" fill="#64748b" font-size="9">4 nodes</text>

  <rect x="170" y="475" width="90" height="50" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="215" y="496" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">Pi-hole HA</text>
  <text x="215" y="512" text-anchor="middle" fill="#64748b" font-size="9">VIP failover</text>

  <rect x="270" y="475" width="90" height="50" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="315" y="496" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">Prometheus</text>
  <text x="315" y="512" text-anchor="middle" fill="#64748b" font-size="9">metrics</text>

  <rect x="370" y="475" width="90" height="50" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="415" y="496" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">Graylog</text>
  <text x="415" y="512" text-anchor="middle" fill="#64748b" font-size="9">logs</text>

  <rect x="470" y="475" width="90" height="50" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="515" y="496" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">Semaphore</text>
  <text x="515" y="512" text-anchor="middle" fill="#64748b" font-size="9">ansible CI/CD</text>

  <rect x="570" y="475" width="90" height="50" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="615" y="496" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">Caddy HA</text>
  <text x="615" y="512" text-anchor="middle" fill="#64748b" font-size="9">reverse proxy</text>

  <rect x="670" y="475" width="90" height="50" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="715" y="496" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">NetBox</text>
  <text x="715" y="512" text-anchor="middle" fill="#64748b" font-size="9">IPAM</text>

  <rect x="770" y="475" width="80" height="50" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="810" y="496" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">n8n</text>
  <text x="810" y="512" text-anchor="middle" fill="#64748b" font-size="9">workflows</text>

  <!-- Safety model callout -->
  <rect x="50" y="555" width="400" height="50" rx="6" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1"/>
  <text x="70" y="575" fill="#fca5a5" font-size="11" font-weight="600">Write Safety: confirm=true required</text>
  <text x="70" y="592" fill="#94a3b8" font-size="10">guest_start/stop, dns_add/remove, semaphore_run_task</text>

  <!-- Graceful degradation callout -->
  <rect x="470" y="555" width="395" height="50" rx="6" fill="rgba(34,197,94,0.08)" stroke="#22c55e" stroke-width="1"/>
  <text x="490" y="575" fill="#86efac" font-size="11" font-weight="600">Graceful Degradation</text>
  <text x="490" y="592" fill="#94a3b8" font-size="10">Missing creds? That service's tools silently skip. Server starts fine.</text>
</svg>
