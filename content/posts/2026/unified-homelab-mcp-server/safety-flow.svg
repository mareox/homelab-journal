<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="700" height="380" fill="url(#bg2)" rx="8"/>
  <text x="350" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">Write Operation Safety Flow</text>

  <!-- Step 1: AI Client calls tool -->
  <rect x="50" y="55" width="200" height="50" rx="8" fill="#134e4a" stroke="#22c55e" stroke-width="1" filter="url(#shadow2)"/>
  <text x="150" y="77" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">AI Client</text>
  <text x="150" y="94" text-anchor="middle" fill="#94a3b8" font-size="10">calls guest_stop(vmid=100)</text>

  <line x1="250" y1="80" x2="310" y2="80" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Step 2: Safety gate check -->
  <polygon points="420,55 520,80 420,105 320,80" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow2)"/>
  <text x="420" y="77" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">confirm</text>
  <text x="420" y="92" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">= true?</text>

  <!-- NO path (preview) -->
  <line x1="420" y1="105" x2="420" y2="160" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="435" y="138" fill="#ef4444" font-size="11" font-weight="600">NO</text>

  <rect x="300" y="165" width="240" height="65" rx="8" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1" filter="url(#shadow2)"/>
  <text x="420" y="188" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="600">Return Preview</text>
  <text x="420" y="205" text-anchor="middle" fill="#94a3b8" font-size="10">"Will stop LXC 100 on Proxmox-Node-1."</text>
  <text x="420" y="220" text-anchor="middle" fill="#94a3b8" font-size="10">"Pass confirm=true to execute."</text>

  <!-- YES path (execute) -->
  <line x1="520" y1="80" x2="580" y2="80" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="548" y="73" fill="#22c55e" font-size="11" font-weight="600">YES</text>

  <rect x="585" y="55" width="90" height="50" rx="8" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="1" filter="url(#shadow2)"/>
  <text x="630" y="77" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Execute</text>
  <text x="630" y="94" text-anchor="middle" fill="#94a3b8" font-size="10">API call</text>

  <line x1="630" y1="105" x2="630" y2="160" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <rect x="560" y="165" width="140" height="45" rx="8" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
  <text x="630" y="193" text-anchor="middle" fill="#86efac" font-size="11">"Stopped LXC 100"</text>

  <!-- Retry flow -->
  <line x1="420" y1="230" x2="420" y2="275" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <text x="435" y="255" fill="#94a3b8" font-size="10">user approves</text>

  <rect x="300" y="280" width="240" height="50" rx="8" fill="#134e4a" stroke="#22c55e" stroke-width="1" filter="url(#shadow2)"/>
  <text x="420" y="302" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">AI Client retries</text>
  <text x="420" y="319" text-anchor="middle" fill="#94a3b8" font-size="10">guest_stop(vmid=100, confirm=true)</text>

  <line x1="540" y1="305" x2="618" y2="210" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrGreen)"/>

  <!-- Legend -->
  <rect x="50" y="340" width="600" height="30" rx="4" fill="rgba(30,41,59,0.5)"/>
  <line x1="70" y1="355" x2="100" y2="355" stroke="#22c55e" stroke-width="2"/>
  <text x="110" y="359" fill="#94a3b8" font-size="10">Confirmed path</text>
  <line x1="210" y1="355" x2="240" y2="355" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="359" fill="#94a3b8" font-size="10">Preview path</text>
  <line x1="370" y1="355" x2="400" y2="355" stroke="#64748b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="410" y="359" fill="#94a3b8" font-size="10">User approval + retry</text>
</svg>
