<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="glow-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#991b1b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="glow-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#166534"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="glow-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="glow-amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" fill="#f8fafc" font-family="Segoe UI, system-ui, sans-serif" font-size="32" font-weight="700" filter="url(#shadow)">FROM EXPIRED CERT TO AUTOMATED RENEWAL</text>
  <text x="600" y="90" text-anchor="middle" fill="#64748b" font-family="Segoe UI, system-ui, sans-serif" font-size="15" letter-spacing="3">AI FOUND THE PROBLEM • AUTOMATION PREVENTS IT</text>

  <!-- Left panel: The Alert (red/broken) -->
  <g transform="translate(80, 130)">
    <rect x="0" y="0" width="320" height="380" rx="8" fill="#111827" stroke="#991b1b" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="320" height="40" rx="8" fill="#1a1010"/>
    <rect x="0" y="32" width="320" height="8" fill="#1a1010"/>
    <circle cx="20" cy="20" r="6" fill="#ef4444" filter="url(#glow)"/>
    <text x="35" y="25" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold">CRITICAL ALERT</text>
    <text x="250" y="25" fill="#475569" font-family="monospace" font-size="10">APR 9</text>

    <!-- Cert icon (broken lock) -->
    <g transform="translate(130, 100)">
      <rect x="-20" y="0" width="40" height="35" rx="4" fill="none" stroke="#ef4444" stroke-width="2.5"/>
      <path d="M-12,-15 Q-12,-30 0,-30 Q12,-30 12,-15 L12,0" fill="none" stroke="#ef4444" stroke-width="2.5"/>
      <!-- Break in the lock -->
      <line x1="8" y1="-20" x2="20" y2="-28" stroke="#0f172a" stroke-width="4"/>
      <circle cx="0" cy="15" r="5" fill="#ef4444"/>
      <line x1="0" y1="20" x2="0" y2="30" stroke="#ef4444" stroke-width="2"/>
    </g>

    <text x="160" y="170" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="14" font-weight="bold">VPN CERT EXPIRED</text>
    <text x="160" y="195" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Remote access down</text>
    <text x="160" y="215" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Road warriors blocked</text>

    <!-- Gilfoyle avatar area -->
    <line x1="20" y1="245" x2="300" y2="245" stroke="#1e293b" stroke-width="0.5"/>
    <circle cx="40" cy="275" r="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="40" y="279" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">G</text>
    <text x="62" y="270" fill="#60a5fa" font-family="monospace" font-size="10">Gilfoyle</text>
    <text x="62" y="288" fill="#94a3b8" font-family="monospace" font-size="9">"Cert expired. VPN is dead."</text>
    <text x="62" y="305" fill="#94a3b8" font-family="monospace" font-size="9">"Options: renew, investigate,"</text>
    <text x="62" y="322" fill="#94a3b8" font-family="monospace" font-size="9">"or accept your fate."</text>

    <!-- Buttons -->
    <rect x="20" y="340" width="85" height="24" rx="4" fill="#991b1b"/>
    <text x="62" y="356" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="9">Renew cert</text>
    <rect x="115" y="340" width="85" height="24" rx="4" fill="#1e293b"/>
    <text x="157" y="356" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">Investigate</text>
    <rect x="210" y="340" width="90" height="24" rx="4" fill="#1e293b"/>
    <text x="255" y="356" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">ccode check</text>
  </g>

  <!-- Center arrow: transformation -->
  <g transform="translate(440, 300)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
    <polygon points="100,-8 120,0 100,8" fill="#3b82f6" filter="url(#glow)"/>
    <text x="60" y="-15" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10">AUTOMATE</text>
  </g>

  <!-- Right panel: The Solution (green/automated) -->
  <g transform="translate(600, 130)">
    <rect x="0" y="0" width="520" height="380" rx="8" fill="#111827" stroke="#166534" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="520" height="40" rx="8" fill="#0a1a10"/>
    <rect x="0" y="32" width="520" height="8" fill="#0a1a10"/>
    <circle cx="20" cy="20" r="6" fill="#22c55e" filter="url(#glow)"/>
    <text x="35" y="25" fill="#22c55e" font-family="monospace" font-size="12" font-weight="bold">3-LAYER CERT AUTOMATION</text>

    <!-- Layer 1 -->
    <rect x="15" y="55" width="490" height="85" rx="6" fill="#1a2332" stroke="#1e40af" stroke-width="0.8"/>
    <text x="30" y="75" fill="#60a5fa" font-family="monospace" font-size="11" font-weight="bold">Layer 1: Consolidate</text>
    <text x="30" y="95" fill="#94a3b8" font-family="monospace" font-size="10">Caddy wildcard cert → NFS share → Semaphore</text>
    <text x="30" y="112" fill="#94a3b8" font-family="monospace" font-size="10">Weekly fingerprint compare → Deploy if changed</text>
    <circle cx="480" cy="90" r="8" fill="#22c55e" opacity="0.3"/>
    <text x="480" y="94" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">✓</text>

    <!-- Layer 2 -->
    <rect x="15" y="155" width="490" height="85" rx="6" fill="#1a2332" stroke="#1e40af" stroke-width="0.8"/>
    <text x="30" y="175" fill="#60a5fa" font-family="monospace" font-size="11" font-weight="bold">Layer 2: Root Store</text>
    <text x="30" y="195" fill="#94a3b8" font-family="monospace" font-size="10">pan-chainguard → CCADB (Mozilla/Apple/Chrome/MS)</text>
    <text x="30" y="212" fill="#94a3b8" font-family="monospace" font-size="10">Monthly import → PAN-OS XML API → Discord report</text>
    <circle cx="480" cy="190" r="8" fill="#22c55e" opacity="0.3"/>
    <text x="480" y="194" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">✓</text>

    <!-- Layer 3 -->
    <rect x="15" y="255" width="490" height="85" rx="6" fill="#1a2332" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="30" y="275" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="bold">Layer 3: AI Monitoring</text>
    <text x="30" y="295" fill="#94a3b8" font-family="monospace" font-size="10">Gilfoyle patrol every 6h → Firewall posture check</text>
    <text x="30" y="312" fill="#94a3b8" font-family="monospace" font-size="10">Semaphore task monitor → Email cert expiry alerts</text>
    <circle cx="480" cy="290" r="8" fill="#f59e0b" opacity="0.3"/>
    <text x="480" y="294" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="10">👁</text>

    <!-- Status line -->
    <text x="15" y="365" fill="#22c55e" font-family="monospace" font-size="11">✓ Cert auto-renewed  ✓ Root store fresh  ✓ AI watching</text>
  </g>

  <!-- Bottom accent -->
  <rect x="200" y="590" width="800" height="2" rx="1" fill="url(#glow-blue)" opacity="0.5"/>
</svg>
