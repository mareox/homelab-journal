            - paragraph [ref=e380]: Giving an AI agent access to your infrastructure sounds terrifying. It should. Here’s how I made it not terrifying.
            - heading "The Trust Level System Anchor" [level=3] [ref=e381]:
              - text: The Trust Level System
              - link "Anchor" [ref=e383] [cursor=pointer]:
                - /url: "#the-trust-level-system"
                - text: "#"
            - paragraph [ref=e384]: "Gilfoyle operates under an explicit trust hierarchy, borrowed from how real organizations onboard sysadmins:"
            - table [ref=e385]:
              - rowgroup [ref=e386]:
                - row "Level Role Can Do" [ref=e387]:
                  - columnheader "Level" [ref=e388]
                  - columnheader "Role" [ref=e389]
                  - columnheader "Can Do" [ref=e390]
              - rowgroup [ref=e391]:
                - 'row "1: Observer Monitor + classify + recommend Read dashboards, classify alerts, suggest actions" [ref=e392]':
                  - 'cell "1: Observer" [ref=e393]':
                    - strong [ref=e394]: "1: Observer"
                  - cell "Monitor + classify + recommend" [ref=e395]
                  - cell "Read dashboards, classify alerts, suggest actions" [ref=e396]
                - 'row "2: Advisor All of L1 + read-only diagnostics Run docker ps, df -h, free -h on servers" [ref=e397]':
                  - 'cell "2: Advisor" [ref=e398]':
                    - strong [ref=e399]: "2: Advisor"
                  - cell "All of L1 + read-only diagnostics" [ref=e400]
                  - cell "Run docker ps, df -h, free -h on servers" [ref=e401]:
                    - text: Run
                    - code [ref=e402]: docker ps
                    - text: ","
                    - code [ref=e403]: df -h
                    - text: ","
                    - code [ref=e404]: free -h
                    - text: on servers
                - 'row "3: Operator All of L2 + restart with approval Restart one service at a time, after explicit approval" [ref=e405]':
                  - 'cell "3: Operator" [ref=e406]':
                    - strong [ref=e407]: "3: Operator"
                  - cell "All of L2 + restart with approval" [ref=e408]
                  - cell "Restart one service at a time, after explicit approval" [ref=e409]
                - 'row "4: Admin All of L3 + config changes with approval Modify configurations, deploy changes" [ref=e410]':
                  - 'cell "4: Admin" [ref=e411]':
                    - strong [ref=e412]: "4: Admin"
                  - cell "All of L3 + config changes with approval" [ref=e413]
                  - cell "Modify configurations, deploy changes" [ref=e414]
            - paragraph [ref=e415]:
              - text: Gilfoyle currently operates at
              - strong [ref=e416]: "Level 1: Observer"
              - text: . He can investigate everything but execute nothing without my explicit approval. Trust is earned over time, not granted by default.
            - heading "Hard Rules (Never Break These) Anchor" [level=3] [ref=e417]:
              - text: Hard Rules (Never Break These)
              - link "Anchor" [ref=e419] [cursor=pointer]:
                - /url: "#hard-rules-never-break-these"
                - text: "#"
            - paragraph [ref=e420]: "Written directly into Gilfoyle’s agent instructions:"
            - list [ref=e421]:
              - listitem [ref=e422]:
                - strong [ref=e423]: READ-ONLY by default.
                - text: No infrastructure changes without approval.
              - listitem [ref=e424]:
                - strong [ref=e425]: NEVER delete a host, VM, LXC, or container.
                - text: Absolute prohibition.
              - listitem [ref=e426]:
                - strong [ref=e427]: NEVER run destructive commands.
                - text: "No"
                - code [ref=e428]: rm -rf
                - text: ","
                - code [ref=e429]: pct destroy
                - text: ","
                - code [ref=e430]: qm destroy
                - text: ","
                - code [ref=e431]: DROP TABLE
                - text: .
              - listitem [ref=e432]:
                - strong [ref=e433]: When in doubt, ask.
                - text: Always better to ask than to guess.
            - heading "The Approval Workflow Anchor" [level=3] [ref=e434]:
              - text: The Approval Workflow
              - link "Anchor" [ref=e436] [cursor=pointer]:
                - /url: "#the-approval-workflow"
                - text: "#"
            - paragraph [ref=e437]: "Every recommended action follows the same protocol:"
            - list [ref=e438]:
              - listitem [ref=e439]:
                - strong [ref=e440]: State the problem.
                - text: What alert fired, what was observed.
              - listitem [ref=e441]:
                - strong [ref=e442]: Recommend the action.
                - text: Specific commands or steps.
              - listitem [ref=e443]:
                - strong [ref=e444]: Explain the risk.
                - text: What could go wrong.
              - listitem [ref=e445]:
                - strong [ref=e446]: Wait for approval.
                - text: Do NOT proceed until I say yes.
              - listitem [ref=e447]:
                - strong [ref=e448]: Execute exactly what was approved.
                - text: Nothing more.
              - listitem [ref=e449]:
                - strong [ref=e450]: Report the result.
                - text: Confirm what happened.
            - paragraph [ref=e451]:
              - text: This maps directly to the MCP server’s confirmation gate from the previous post. Write operations return a preview unless
              - code [ref=e452]: confirm=true
              - text: is passed. The AI shows me what
              - emphasis [ref=e453]: would
              - text: happen, and only executes when I approve.
            - heading "OpenClaw Security Layers Anchor" [level=3] [ref=e454]:
              - text: OpenClaw Security Layers
              - link "Anchor" [ref=e456] [cursor=pointer]:
                - /url: "#openclaw-security-layers"
                - text: "#"
            - paragraph [ref=e457]: "Beyond Gilfoyle’s behavioral constraints, OpenClaw provides defense-in-depth:"
            - paragraph [ref=e458]:
              - strong [ref=e459]: "Access control before intelligence:"
            - list [ref=e460]:
              - listitem [ref=e461]:
                - strong [ref=e462]: DM pairing.
                - text: Unknown senders must be explicitly approved before the bot responds.
              - listitem [ref=e463]:
                - strong [ref=e464]: Channel allowlists.
                - text: Gilfoyle only monitors specific homelab channels, ignores everything else.
              - listitem [ref=e465]:
                - strong [ref=e466]: Mention gating.
                - text: In group channels, only responds when @mentioned (except his dedicated inbox).
            - paragraph [ref=e467]:
              - strong [ref=e468]: "Tool policy and sandboxing:"
            - list [ref=e469]:
              - listitem [ref=e470]:
                - strong [ref=e471]: Tool deny lists.
                - text: Dangerous tools (
                - code [ref=e472]: gateway
                - text: ","
                - code [ref=e473]: cron
                - text: ","
                - code [ref=e474]: sessions_spawn
                - text: ) are blocked by default.
              - listitem [ref=e475]:
                - strong [ref=e476]: Scoped API access.
                - text: Gilfoyle’s REST API key only grants access to read operations plus two scoped writes (guest restart, run Semaphore task).
              - listitem [ref=e477]:
                - strong [ref=e478]: Workspace isolation.
                - text: Each agent gets its own workspace directory with controlled filesystem access.
            - paragraph [ref=e479]:
              - strong [ref=e480]: "Prompt injection defense:"
            - list [ref=e481]:
              - listitem [ref=e482]:
                - strong [ref=e483]: Content is treated as hostile.
                - text: Links, attachments, and pasted instructions are untrusted by default.
              - listitem [ref=e484]:
                - strong [ref=e485]: Model choice matters.
                - text: OpenClaw recommends the strongest instruction-hardened models for tool-enabled agents. Smaller models are too susceptible to injection.
              - listitem [ref=e486]:
                - strong [ref=e487]: Blast radius design.
                - text: Even if prompt injection succeeds, the read-only tool policy limits what can happen.
            - paragraph [ref=e488]:
              - strong [ref=e489]: "Security audit:"
            - table [ref=e493]:
              - rowgroup [ref=e494]:
                - row "1 openclaw security audit --deep" [ref=e495]:
                  - cell "1" [ref=e496]:
                    - code [ref=e498]: "1"
                  - cell "openclaw security audit --deep" [ref=e499]:
                    - code [ref=e501]:
                      - generic [ref=e503]: openclaw security audit --deep
            - paragraph [ref=e504]: This checks inbound access, tool blast radius, network exposure, browser control, disk permissions, plugin trust, and policy drift. I run it after every config change.
            - paragraph [ref=e505]:
              - text: "The philosophy is simple:"
              - strong [ref=e506]: design so that manipulation has limited blast radius.
              - text: If Gilfoyle gets tricked by a crafted message, the worst he can do is read data and post to Discord. He can’t delete a VM, can’t modify a config, can’t restart a service. The safety net is structural, not behavioral.
            - 'heading "The Incident: When Gilfoyle Cried Wolf Anchor" [level=2] [ref=e507]':
              - text: "The Incident: When Gilfoyle Cried Wolf"
              - link "Anchor" [ref=e509] [cursor=pointer]:
                - /url: "#the-incident-when-gilfoyle-cried-wolf"
                - text: "#"
            - paragraph [ref=e510]: "Three weeks in, Gilfoyle posted this during a routine patrol:"
            - paragraph
            - figure [ref=e511]:
              - img "Gilfoyle’s false-positive WARNING alert claiming postgres FDs at 96.6%, with actionable buttons and escalation to ccode" [ref=e512]
            - paragraph
            - paragraph [ref=e513]: "Looks serious, right? 96.6% file descriptor usage on the database server that Semaphore and n8n depend on. Complete with actionable buttons: Restart PostgreSQL, Investigate, Reboot LXC, Acknowledge."
            - paragraph [ref=e514]:
              - text: I asked ccode (my Claude Code CLI bot) to investigate. The actual value was
              - strong [ref=e515]: 3.71%
              - text: . Flat for the entire preceding hour.
            - paragraph
            - figure [ref=e516]:
              - img "ccode’s investigation showing the real value was 3.71% CLEAR, proving Gilfoyle inverted the metric by reading headroom as utilization" [ref=e517]
            - paragraph
            - heading "What Happened Anchor" [level=3] [ref=e518]:
              - text: What Happened
              - link "Anchor" [ref=e520] [cursor=pointer]:
                - /url: "#what-happened"
                - text: "#"
            - paragraph [ref=e521]:
              - text: Gilfoyle read a Netdata chart and inverted the metric.
              - code [ref=e522]: 100 - 3.71 = 96.29%
              - text: ", which rounds to ~96.6%. He read the"
              - emphasis [ref=e523]: headroom
              - text: (available FDs) and reported it as
              - emphasis [ref=e524]: utilization
              - text: .
            - paragraph [ref=e525]:
              - text: The clues were all there. Prometheus showed no firing alerts, Graylog showed zero errors,
              - code [ref=e526]: pg_stat_activity
              - text: reported only 9 connections out of a 100 max. But Gilfoyle confidently reported a warning because the chart value looked alarming without understanding which dimension he was reading.
            - heading "Why This Matters Anchor" [level=3] [ref=e527]:
              - text: Why This Matters
              - link "Anchor" [ref=e529] [cursor=pointer]:
                - /url: "#why-this-matters"
                - text: "#"
            - paragraph [ref=e530]:
              - text: "This is the defining lesson of running AI agents on infrastructure:"
              - strong [ref=e531]: LLMs misread time-series data.
              - text: They’re not deterministic chart readers. When a metric has both “used” and “available” dimensions, an LLM can confuse them. A single-percentage reading that could be either 96% utilization or 96% headroom is an ambiguity trap.
            - heading "The Fix Anchor" [level=3] [ref=e532]:
              - text: The Fix
              - link "Anchor" [ref=e534] [cursor=pointer]:
                - /url: "#the-fix"
                - text: "#"
            - paragraph [ref=e535]: "We added Netdata interpretation guardrails to the alert-correlator skill:"
            - list [ref=e536]:
              - listitem [ref=e537]:
                - text: Before firing an FD-exhaustion alert, verify against the alarms API (which has an authoritative
                - code [ref=e538]: CLEAR
                - text: /
                - code [ref=e539]: WARNING
                - text: /
                - code [ref=e540]: CRITICAL
                - text: status), not the raw chart
              - listitem [ref=e541]:
                - text: Require at least one independent corroborating query (
                - code [ref=e542]: pg_stat_activity
                - text: connections, raw FD count)
              - listitem [ref=e543]: If reported utilization is >90% but connections are <20 out of 100 max, the reading is almost certainly wrong
            - paragraph [ref=e544]:
              - text: "The runbook now says:"
              - emphasis [ref=e545]: trust the alarm status, not the chart dimension.
            - heading "The Silver Lining Anchor" [level=3] [ref=e546]:
              - text: The Silver Lining
              - link "Anchor" [ref=e548] [cursor=pointer]:
                - /url: "#the-silver-lining"
                - text: "#"
            - paragraph [ref=e549]: Gilfoyle’s read-only role worked exactly as designed. He proposed restarting PostgreSQL (option 1), but couldn’t actually do it. No damage was possible. The false alarm cost 15 minutes of investigation time, not an unnecessary database restart.
            - paragraph [ref=e550]:
              - strong [ref=e551]: This is why trust levels exist.
              - text: An AI at Level 1 (Observer) that cries wolf wastes time. An AI at Level 3 (Operator) that cries wolf and acts on it causes an outage.
            - 'heading "Real Incidents: Beyond the False Positive Anchor" [level=2] [ref=e552]':
              - text: "Real Incidents: Beyond the False Positive"
              - link "Anchor" [ref=e554] [cursor=pointer]:
                - /url: "#real-incidents-beyond-the-false-positive"
                - text: "#"
            - paragraph [ref=e555]: The postgres FD incident was educational, but Gilfoyle has caught real problems too.
            - heading "DNS Primary Down (April 4) Anchor" [level=3] [ref=e556]:
              - text: DNS Primary Down (April 4)
              - link "Anchor" [ref=e558] [cursor=pointer]:
                - /url: "#dns-primary-down-april-4"
                - text: "#"
            - paragraph
            - figure [ref=e559]:
              - img "Gilfoyle’s CRITICAL alert for DNS Primary down, showing Pi-hole FTL refusing TCP connections with HA failover active" [ref=e560]
            - paragraph
            - paragraph [ref=e561]: Gilfoyle correctly identified that the service was ICMP-reachable but DNS was refusing connections, a subtlety that raw monitoring might miss. He also noted that HA failover was already handling traffic, so this was degraded redundancy, not a total outage. I replied “1” and ccode restarted FTL.
            - heading "VPN Certificate Expired (April 9) Anchor" [level=3] [ref=e562]:
              - text: VPN Certificate Expired (April 9)
              - link "Anchor" [ref=e564] [cursor=pointer]:
                - /url: "#vpn-certificate-expired-april-9"
                - text: "#"
            - paragraph
            - figure [ref=e565]:
              - 'img "Gilfoyle’s CRITICAL alert for expired VPN certificate with actionable buttons: Renew, Check Caddy, ccode investigate" [ref=e566]'
            - paragraph
            - paragraph [ref=e567]: "This one resolved itself. The cert flap cleared within hours. Gilfoyle posted the recovery notice and ccode closed the escalation as self-resolved. But the initial triage was spot-on: correct severity, clear impact statement, actionable options."
            - heading "What Gilfoyle Looks Like Day-to-Day Anchor" [level=2] [ref=e568]:
              - text: What Gilfoyle Looks Like Day-to-Day
              - link "Anchor" [ref=e570] [cursor=pointer]:
                - /url: "#what-gilfoyle-looks-like-day-to-day"
                - text: "#"
            - paragraph [ref=e571]: "A typical morning from the Discord channels:"
            - paragraph [ref=e572]:
              - strong [ref=e573]: 8:00 AM.
              - text: "Daily report lands summarizing 24 hours of activity across 16 channels: alert counts, notable events, safe-update digest, and noise reduction suggestions."
            - paragraph [ref=e574]:
              - strong [ref=e575]: 8:30 AM (Monday).
              - text: "Capacity report with Prometheus trend data: disk, RAM, CPU projections per node with estimated days to threshold."
            - paragraph [ref=e576]:
              - strong [ref=e577]: Throughout the day.
              - text: Alert triage in real-time. Gilfoyle immediately classifies severity, cross-references Prometheus + Graylog + Wazuh, and posts options with buttons. I tap from my phone.
            - paragraph [ref=e578]:
              - strong [ref=e579]: Every 6 hours.
              - text: "Patrol sweeps. Most look like this:"
            - blockquote [ref=e580]:
              - paragraph [ref=e581]: "“PATROL 15:45 PT | All clear. Services: Prometheus 0 firing, Caddy HA healthy, Pi-hole HA healthy, Semaphore 0 failed, n8n 5 active, Graylog 0 errors. Firewall: 854 sessions (0.4%). Security: Wazuh 5/6 agents. Nothing requires action.”"
            - paragraph [ref=e582]: When something is off, the density changes. Full investigation, context, impact assessment, and options with buttons. Match verbosity to severity.
            - heading "Lessons Learned Anchor" [level=2] [ref=e583]:
              - text: Lessons Learned
              - link "Anchor" [ref=e585] [cursor=pointer]:
                - /url: "#lessons-learned"
                - text: "#"
            - heading "1. Trust levels are non-negotiable Anchor" [level=3] [ref=e586]:
              - text: 1. Trust levels are non-negotiable
              - link "Anchor" [ref=e588] [cursor=pointer]:
                - /url: "#1-trust-levels-are-non-negotiable"
                - text: "#"
            - paragraph [ref=e589]: Start every AI agent at Level 1 (Observer). Let it prove it can classify and advise correctly before giving it the ability to act. Gilfoyle’s false-positive incident proved this. The trust system prevented a real-world impact from a hallucinated metric.
            - heading "2. LLMs are not deterministic monitoring tools Anchor" [level=3] [ref=e590]:
              - text: 2. LLMs are not deterministic monitoring tools
              - link "Anchor" [ref=e592] [cursor=pointer]:
                - /url: "#2-llms-are-not-deterministic-monitoring-tools"
                - text: "#"
            - paragraph [ref=e593]: They will misread charts, invert metrics, and confuse dimensions. Design your skills with verification steps. Never let an AI fire an alert based on a single data point without corroboration. The alarms API exists for a reason.
            - heading "3. Security is structural, not behavioral Anchor" [level=3] [ref=e594]:
              - text: 3. Security is structural, not behavioral
              - link "Anchor" [ref=e596] [cursor=pointer]:
                - /url: "#3-security-is-structural-not-behavioral"
                - text: "#"
            - paragraph [ref=e597]: "Don’t rely on “please don’t do bad things” in a system prompt. Build actual constraints: read-only tool policies, scoped API keys, approval workflows, DM pairing, tool deny lists. Assume the model can be manipulated and design so manipulation has limited blast radius."
            - heading "4. Rate limiting prevents alert fatigue Anchor" [level=3] [ref=e598]:
              - text: 4. Rate limiting prevents alert fatigue
              - link "Anchor" [ref=e600] [cursor=pointer]:
                - /url: "#4-rate-limiting-prevents-alert-fatigue"
                - text: "#"
            - paragraph [ref=e601]: Without dedup windows and cascade detection, Gilfoyle would post the same alert every 6 hours. The 4-layer rate limiting system keeps signal-to-noise high. When everything is quiet, the patrol report is 4 lines. When something’s broken, it’s a full investigation.
            - heading "5. The MCP server was the enabling layer Anchor" [level=3] [ref=e602]:
              - text: 5. The MCP server was the enabling layer
              - link "Anchor" [ref=e604] [cursor=pointer]:
                - /url: "#5-the-mcp-server-was-the-enabling-layer"
                - text: "#"
            - paragraph [ref=e605]: None of this works without the unified tool interface from the previous post. 34 tools across 11 services, all accessible through one API. Gilfoyle doesn’t SSH into boxes or parse HTML dashboards. He calls structured tools and gets structured data back. The MCP server turned “monitor my homelab” from an impossible ask into a weekend project.
            - heading "What’s Next Anchor" [level=2] [ref=e606]:
              - text: What’s Next
              - link "Anchor" [ref=e608] [cursor=pointer]:
                - /url: "#whats-next"
                - text: "#"
            - paragraph [ref=e609]: Gilfoyle is still at Trust Level 1. The plan is to promote him to Level 2 (Advisor) once he’s demonstrated consistent accuracy on alert classification for 30 days. Level 3 (Operator) will require implementing proper audit logging so every action is recorded and reversible.
            - paragraph [ref=e610]: The false-positive incident actually accelerated trust, not because the error was acceptable, but because the safety system caught it cleanly. A system that fails safely earns trust faster than one that’s never been tested.
            - paragraph [ref=e611]: In the meantime, Gilfoyle watches. Four times a day, he sweeps every service, checks every metric, and reports back. Usually it’s “all clear.” Sometimes it’s “heads up, disk is trending.” Occasionally it’s “this looks broken, here are your options.”
            - paragraph [ref=e612]: And he does it all while staying in character. Dry, competent, slightly sarcastic. Just like the original.
