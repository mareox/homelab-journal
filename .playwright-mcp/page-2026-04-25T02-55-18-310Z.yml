          - generic [ref=e169]:
            - 'heading "The Problem: Nobody’s Watching at 3 AM Anchor" [level=2] [ref=e170]':
              - text: "The Problem: Nobody’s Watching at 3 AM"
              - link "Anchor" [ref=e172] [cursor=pointer]:
                - /url: "#the-problem-nobodys-watching-at-3-am"
                - text: "#"
            - paragraph [ref=e173]: My homelab runs 47 guests across 4 Proxmox nodes, with HA pairs for DNS and reverse proxy, a Wazuh XDR deployment, centralized logging in Graylog, and CI/CD automation through Semaphore. It’s a lot of infrastructure for one person to monitor.
            - paragraph [ref=e174]:
              - text: I had alerts. Grafana fires when RAM hits 75%. Wazuh flags suspicious file changes. n8n emails me when workflows fail. But alerts are reactive. They tell you something broke. They don’t tell you something is
              - emphasis [ref=e175]: about to
              - text: break.
            - paragraph [ref=e176]: What I wanted was an on-call network admin. Someone who checks everything four times a day, correlates alerts across services, spots trends before they become incidents, and wakes me up only when it actually matters.
            - paragraph [ref=e177]: So I hired Gilfoyle.
            - heading "Who Is Gilfoyle? Anchor" [level=2] [ref=e178]:
              - text: Who Is Gilfoyle?
              - link "Anchor" [ref=e180] [cursor=pointer]:
                - /url: "#who-is-gilfoyle"
                - text: "#"
            - paragraph [ref=e181]:
              - text: Named after the paranoid, competent sysadmin from Silicon Valley, Gilfoyle is an AI agent running on
              - link "OpenClaw" [ref=e182] [cursor=pointer]:
                - /url: https://openclaw.ai/
              - text: ", an open-source AI gateway that connects LLMs to messaging platforms with built-in tool execution, session management, and security controls."
            - paragraph [ref=e183]: Gilfoyle lives on a dedicated LXC in my Proxmox cluster, monitors 20 Discord channels, and has access to 34 tools across 11 homelab services. He runs infrastructure patrols four times a day, triages every alert that fires, generates daily and weekly reports, and stays in character while doing it.
            - paragraph [ref=e184]: He’s also read-only by default, can’t delete anything, and needs my explicit approval before touching a single container. More on that later.
            - heading "The MCP Connection Anchor" [level=2] [ref=e185]:
              - text: The MCP Connection
              - link "Anchor" [ref=e187] [cursor=pointer]:
                - /url: "#the-mcp-connection"
                - text: "#"
            - paragraph [ref=e188]:
              - text: In a
              - link "previous post" [ref=e189] [cursor=pointer]:
                - /url: /homelab-journal/posts/2026/unified-homelab-mcp-server/
              - text: ", I built a unified MCP server that wraps 9 homelab services behind 32 tools: Proxmox, Pi-hole HA, Prometheus, Graylog, Semaphore, Caddy, NetBox, n8n, and PBS."
            - paragraph [ref=e190]:
              - text: That MCP server became Gilfoyle’s nervous system. Every patrol check, every alert triage, every health query flows through it. When Gilfoyle checks if “anything is broken,” he’s calling the same
              - code [ref=e191]: service_health
              - text: tool that runs parallel checks across all configured services via
              - code [ref=e192]: asyncio.gather()
              - text: .
            - paragraph [ref=e193]: The MCP server was later extended with a REST API layer (port 8100), adding PAN-OS firewall and CC Server monitoring. This brought the total to 34 tools across 11 services. The REST API added proper auth scoping so Gilfoyle only gets access to what he needs.
            - heading "What Gilfoyle Actually Does Anchor" [level=2] [ref=e194]:
              - text: What Gilfoyle Actually Does
              - link "Anchor" [ref=e196] [cursor=pointer]:
