            - paragraph [ref=e271]: "This is where it gets interesting. Four times a day (03:45, 09:45, 15:45, 21:45 PT), Gilfoyle runs a 10-check sweep:"
            - list [ref=e272]:
              - listitem [ref=e273]:
                - strong [ref=e274]: "Prometheus alerts:"
                - text: anything currently firing
              - listitem [ref=e275]:
                - strong [ref=e276]: "Backup health:"
                - text: failed PBS jobs in the last 24h
              - listitem [ref=e277]:
                - strong [ref=e278]: "Service health:"
                - text: all 11 services reachable
              - listitem [ref=e279]:
                - strong [ref=e280]: "Graylog error spikes:"
                - text: error rate vs baseline in the last 6h
              - listitem [ref=e281]:
                - strong [ref=e282]: "Firewall posture:"
                - text: PAN-OS interfaces, HA status, session count
              - listitem [ref=e283]:
                - strong [ref=e284]: "Certificate expiry:"
                - text: ACME cert monitoring
              - listitem [ref=e285]:
                - strong [ref=e286]: "Semaphore failures:"
                - text: failed CI/CD tasks since last patrol
              - listitem [ref=e287]:
                - strong [ref=e288]: "DNS consistency:"
                - text: A records pointing to stopped or destroyed guests
              - listitem [ref=e289]:
                - strong [ref=e290]: "Wazuh security:"
                - text: disconnected agents, high-level alerts, FIM changes
              - listitem [ref=e291]:
