          - heading "1. Multi-Tier DNS Saves the Day Anchor" [level=3] [ref=e795]:
            - text: 1. Multi-Tier DNS Saves the Day
            - link "Anchor" [ref=e797] [cursor=pointer]:
              - /url: "#1-multi-tier-dns-saves-the-day"
              - text: "#"
          - paragraph [ref=e798]: When Pi-hole crashed due to database pressure, the firewall’s static entries kept core infrastructure resolving. Without this layer, Proxmox nodes couldn’t reach each other.
          - heading "2. Config Drift Kills HA Anchor" [level=3] [ref=e799]:
            - text: 2. Config Drift Kills HA
            - link "Anchor" [ref=e801] [cursor=pointer]:
              - /url: "#2-config-drift-kills-ha"
              - text: "#"
          - paragraph [ref=e802]:
            - text: The Caddy HA pair once drifted out of sync when I updated only one node. The VIP failed over to the outdated node, breaking several services.
            - strong [ref=e803]: Always deploy to BOTH nodes.
          - heading "3. VRRP ID Collisions Anchor" [level=3] [ref=e804]:
            - text: 3. VRRP ID Collisions
            - link "Anchor" [ref=e806] [cursor=pointer]:
              - /url: "#3-vrrp-id-collisions"
              - text: "#"
          - paragraph [ref=e807]: Each HA pair needs a unique VRRP ID. When I accidentally reused ID 55 for both DNS and NFS, one pair’s failover broke the other. Now I track IDs in documentation.
          - heading "4. Health Checks Need Redundancy Anchor" [level=3] [ref=e808]:
            - text: 4. Health Checks Need Redundancy
            - link "Anchor" [ref=e810] [cursor=pointer]:
              - /url: "#4-health-checks-need-redundancy"
              - text: "#"
          - paragraph [ref=e811]: Early Pi-hole health checks tested only one upstream. If that upstream was slow, the check failed and triggered unnecessary failover. Now checks test multiple targets with fallback.
